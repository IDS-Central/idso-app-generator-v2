datasets:
  ADP_system:
    description: 'ADP payroll and HR data. Ingested from ADP Workforce Now exports. Covers

      payroll line items (every pay stub row), employee dimension (roster with

      department / job title / cost center), and timecards. Use this for any

      question about compensation, headcount, hours worked, or allocations of

      payroll to departments / cost centers / GL accounts.

      '
    tables:
      adp_payroll_output:
        description: 'Payroll fact table: one row per employee per pay-period per pay

          category (earnings, deductions, taxes). Includes pay period start/end,

          payment date, employee name, department, business unit, job title,

          location, and GL account code. This is the primary source for

          "what did we pay whom, when, and for what GL line."

          '
      employees_dim:
        description: 'Active employee dimension: one row per employee with current

          identifying and HR attributes (name, email, hire/termination date,

          employment status, job title, department, cost center, GL account).

          Join on employee_id from adp_payroll_output or timecards_dim.

          '
      employees_dim_staging:
        description: 'Staging copy of employees_dim used during the ADP sync pipeline. Do

          not query directly for reporting; use employees_dim instead.

          '
      payroll_sync_state:
        description: 'Operational bookkeeping for the ADP payroll sync pipeline (last

          processed item, batch cursors). Not useful for business reporting.

          '
      sync_metadata:
        description: 'Operational bookkeeping for the ADP sync pipeline (run-level status,

          batch counts, timestamps). Not useful for business reporting.

          '
      timecards_dim:
        description: 'Timecard facts: one row per employee per pay period with total hours

          worked. Join to employees_dim on employee_id for name / department

          context. Empty or near-empty for salaried employees.

          '
  Dentira_system:
    description: 'Dentira dental-supplies e-procurement data. Ingested from the Dentira

      platform that IDSO practices use to order dental supplies, equipment,

      and services from vendors. Covers invoices, orders, line items, the

      practice catalog, and the supplier / vendor catalog. Use this for

      supply-chain spend, vendor performance, supplier consolidation, and

      practice-level ordering analysis.

      '
    tables:
      dentira_invoices:
        description: 'Supplier invoice headers: one row per invoice received through

          Dentira. Includes invoice number, date, status, supplier, vendor,

          clinic/practice, and vendor/supplier cross-references.

          '
      dentira_invoice_items:
        description: 'Supplier invoice line items: one row per line on each invoice with

          SKU, item name, unit price, quantity, total, and GL account code.

          Join to dentira_invoices on invoice_number.

          '
      dentira_orders:
        description: 'Supplier order headers (purchase orders placed through Dentira). One

          row per order with practice, supplier, vendor, order date, received

          date, status, approver, and catalog flags.

          '
      dentira_orders_items:
        description: 'Order line items: one row per line on each purchase order with

          product, item name, UOM, category, manufacturer, unit price,

          ordered quantity, received quantity, and total.

          '
      dentira_practices:
        description: 'Practice (clinic) dimension for Dentira: location_id, clinic name,

          email. Small lookup table used to join orders / invoices to a

          practice.

          '
      dentira_suppliers:
        description: 'Supplier / vendor dimension: supplier_id, supplier name, vendor_id,

          vendor_name, vendor_alias. Lookup for Dentira orders and invoices.

          '
      dentira_load_audit:
        description: 'Operational bookkeeping for the Dentira ingestion pipeline (load

          timestamps, row counts, error messages, load status). Not useful

          for business reporting.

          '
  PMS_system:
    description: 'Practice-Management-System payment transactions AND the reconciliation

      engine that matches them to the bank side. PMSTxn holds dental

      insurance carrier payments, patient payments, and other receipts that

      were recorded in the practice-management system. The rest of the

      dataset (ReconBatches, BatchRankings, Criteria*_Candidates, FuzzyMap,

      LLM_BatchPayload, LLM_RankResults, Match_Config, Reconciliations,

      StrictMatch) is the IDSO-built ML/LLM pipeline that matches each PMS

      payment to the corresponding bank deposit in Sage Intacct. Use PMSTxn

      for PMS-side revenue questions; use Reconciliations or Reconciliation_view

      for "what got matched vs. what is still open."

      '
    tables:
      PMSTxn:
        description: 'Raw payment transactions from practice-management systems. One row

          per payment: carrier_name, claim_id, amount, practice_id,

          payment_type, status, bank_vendor, PMS_Date. This is the PMS side

          of reconciliation (vs. SageIntacct_BankTransactions on the bank

          side).

          '
      SageIntacct_BankTransactions:
        description: 'Bank-side view of transactions exported from Sage Intacct, filtered

          and enriched for the matching engine. One row per bank line with

          account, posting date, amount, payer, description, and transaction

          type. Pair with PMSTxn for reconciliation queries.

          '
      Reconciliations:
        description: 'Authoritative match results: one row per reconciled pair

          (PMS payment x Bank transaction) with amount applied, created/updated

          timestamps, status, modification history, and rejection reason.

          Start here for "what is matched, what is still open" questions.

          '
      Reconciliation_view2:
        description: 'Convenience view that joins Reconciliations back to the underlying

          PMS and bank rows (with location, practice, amount, carrier). Use

          for reporting when you need the matched pair plus context in one

          row.

          '
      ReconBatches:
        description: 'Batches of reconciliation candidates produced by the matching engine.

          One row per batch run; join to ReconBatchItems for the items

          inside each batch.

          '
      ReconBatches_UI:
        description: 'UI-facing view of ReconBatches, same shape with formatting /

          labels tuned for the internal reconciliation dashboard app.

          '
      ReconBatchItems:
        description: 'Items (candidate PMS x Bank pairs) inside each reconciliation batch

          with status, AI flag, flag reason, and computed flag fields. Join

          to ReconBatches on BatchID.

          '
      ReconBatchItems_UI:
        description: 'UI-facing view of ReconBatchItems for the reconciliation dashboard.

          '
      ReconciliationApprovals:
        description: 'Approval audit trail for reconciliations: who approved which

          batch/txn, when, and any attached notes.

          '
      ReconCheckpoint:
        description: 'Checkpoint markers for long-running reconciliation jobs (last

          processed bank txn id). Operational only.

          '
      BatchDecisions:
        description: 'Per-batch decision outcomes: DecisionID, Decision, DecisionBy,

          DecisionAt, Reason. Links the human/LLM approval to a batch.

          '
      BatchRankings:
        description: 'Per-batch candidate rankings produced by the matching engine, with

          rank, confidence, and LLM rationale. Drives which candidates get

          surfaced first in the review UI.

          '
      Criteria1_Candidates:
        description: 'Candidate PMS-Bank pairs generated by matching rule set 1 (typically

          exact amount + date proximity). Consumed by the downstream ranking /

          batching logic.

          '
      Criteria2_Candidates:
        description: 'Candidate PMS-Bank pairs generated by matching rule set 2 (looser

          date window, partial description match).

          '
      Criteria3_Candidates:
        description: 'Candidate PMS-Bank pairs generated by matching rule set 3 (fuzzy /

          multi-field).

          '
      PMS_Criteria2:
        description: 'PMS-side intermediate used by the Criteria 2 matcher. Aggregates

          PMS transactions by practice / vendor / payment type before

          candidate generation.

          '
      Bank_Transaction_Timing_BQ:
        description: 'Profiling / timing metadata for SageIntacct_BankTransactions loads.

          Operational only.

          '
      DailyReconciliationSummary:
        description: 'Daily rollup of reconciliation status: per-day counts of matched /

          unmatched / reviewed pairs. Drives the ops dashboard KPIs.

          '
      FuzzyMap:
        description: 'Fuzzy-match lookup table between PMS and bank payer strings (carrier

          name variants, payer aliases). Used to bridge spelling / formatting

          differences before candidate ranking.

          '
      LLM_BatchPayload:
        description: 'Raw input payload sent to the LLM for each reconciliation batch

          (candidates + context). Useful for replaying or debugging AI

          decisions.

          '
      LLM_RankResults:
        description: 'Raw LLM ranking output per batch: ranked candidates with confidence

          and rationale. Joined into BatchRankings for downstream use.

          '
      Match_Config:
        description: 'Configuration for the matching engine: per-channel tolerance cents,

          business-day windows, criteria toggles. Edit here to tune the

          matcher without code changes.

          '
      StrictMatch:
        description: 'Strict exact-match candidates (amount + date + identifier equality).

          Highest-confidence subset, usually auto-approved.

          '
      location_id_mapping:
        description: 'Mapping from raw PMS location identifiers to IDSO location_id. Used

          to normalise practice-level keys across PMS vendors.

          '
      location_xwalk:
        description: 'Cross-walk between bank-account-level location identifiers and PMS

          location_id. Joins bank rows (where only an account is present) to

          a practice.

          '
      mapping_norm:
        description: 'Normalised payer-name -> canonical-vendor mapping used by the

          fuzzy matcher. Regenerated from dim_mappings.bank_description_*.

          '
      sage_bank_account_mapping:
        description: 'Bank account id (Sage) -> practice / entity mapping. Same idea as

          location_xwalk but at the bank-account grain.

          '
      transaction_types_custom_categories_raw:
        description: 'User-defined overrides for transaction type / category classification

          used in reconciliation. Tweak here to reclassify payment types.

          '
      update_mapped:
        description: 'Audit log of mapping-table updates (when a cross-walk row was added

          or edited, by whom).

          '
      clean_txn:
        description: 'Cleaned / normalised copy of PMSTxn and bank rows used as the input

          to the matching pipeline. Do not query for reporting; use PMSTxn

          or SageIntacct_BankTransactions.

          '
      final_cleaned_result:
        description: 'Final cleaned output of the reconciliation pipeline for a run.

          Typically consumed by downstream dashboards.

          '
      AcceptedMatches:
        description: Historical record of matches that were accepted (by human or auto-rule)
          in the reconciliation workflow. Join to PMSTxn and BankTxn on MatchID to get the
          matched pair. Status / UndoneBy / UndoReason let you see matches that were later
          reversed.
      AuditLogs:
        description: 'Append-only audit trail of user actions in the reconciliation dashboard:
          who did what (Action, EntityType, EntityID), when, from which IP, with changes and
          notes. Use for compliance, forensics, and "who changed X" questions.'
      BankList_FuzzyNorm:
        description: Fuzzy-normalised bank payer list with PMS mapping candidates and soundex/phonetic
          keys (n2, n3). Input to the fuzzy matcher.
      BankTxn:
        description: Raw bank transactions as ingested (before normalisation). One row per
          bank line with Bank_Transaction_ID, Date, Transaction_Type, Payment_Description,
          Amount, Status, Bank_Acct_No, location_id, payer_name, pms_mapping. This is the
          PMS_system view of the bank side; see Sage_system_v2.sage_bank_transactions_v2 for
          the canonical Sage export.
      BankTxn_CSV_files_Upload_Log:
        description: 'Per-file upload audit for bank CSVs: filename, Bank_Acct_No, inserted_rows,
          skipped_loan_sweep_rows, processed_at, LogID. Operational only.'
      BankTxn_CleanTemp:
        description: Temporary table used by the bank-txn cleaning step. Not authoritative.
      BankTxn_Excluded_Archive:
        description: Bank transactions explicitly excluded from reconciliation (loans, sweeps,
          transfers). Kept for audit so exclusions are reversible.
      BankTxn_FuzzyNorm:
        description: Fuzzy-normalised BankTxn with phonetic / soundex keys (n1, s1) for the
          fuzzy matcher. Intermediate; do not query for reporting.
      BankTxn_MapFuzzy:
        description: Per-row mapping result from the fuzzy matcher (ID -> PMS_Mapping). Intermediate.
      BankTxn_MapStrict:
        description: Per-row mapping result from the strict matcher (ID -> PMS_Mapping). Intermediate.
      BankTxn_MapTemp:
        description: Temporary mapping table during BankTxn processing. Intermediate.
      BankTxn_RematchTemp:
        description: Temporary working table used when re-running the matcher against a bounded
          subset of bank txns. Intermediate.
      BankTxn_Staging:
        description: Staging copy of BankTxn before it is promoted to BankTxn / BankTxn_Normalised.
          Includes __insertIdContentHash for dedupe. Operational only.
      Bank_Payer_List:
        description: Raw observed-bank-payer list (Payer_Name_Description + PMS_Mapping) before
          normalisation. Superseded by BankPayersList_Normalised.
      Bank_Transaction_Timing:
        description: Mapping rules that classify bank txns by PMS_Mapping + priority date
          windows (+ exclude dates, possible merchant fee). Used by the matcher to enforce
          business-day windows.
      BankPayerList_Normalised:
        description: 'Canonical bank payer list after normalisation: one row per bank payer
          with normalised name / soundex / PMS mapping list. Dimension-style lookup.'
      BankTxn_Normalised:
        description: 'BankTxn after full normalisation: payment_description, normalised_desc,
          soundex_desc. The canonical cleaned bank-txn view used by the matcher.'
  Sage_system_v2:
    description: 'Sage Intacct general ledger and bank data. This is the authoritative

      accounting source: every GL journal entry line and every bank-side

      transaction as booked in Sage. Join gl_journal_entry_lines to the

      dim_* columns to slice by department, location, vendor, customer,

      project, employee, item, or class. Use for any finance, close,

      cash-flow, or revenue-by-dimension question.

      '
    tables:
      gl_journal_entry_lines:
        description: 'The GL fact: one row per journal-entry line with GL account, debit/

          credit amount, dimension keys (department, location, vendor,

          customer, project, employee, item, class), currency, and

          reconciliation status. The primary source for financial reporting.

          '
      sage_bank_transactions_v2:
        description: 'Bank-side transactions as exported from Sage Intacct bank feeds.

          One row per bank line with account, posting date, amount, payer,

          description. Pairs with PMS_system.PMSTxn in the reconciliation

          pipeline.

          '
      bank_transaction_summaries:
        description: 'Rolled-up bank transaction summaries (by bank, day, and posting

          status). Faster for dashboards than scanning the raw txn table.

          '
      bank_id_practice_mapping:
        description: 'Bank account -> practice crosswalk at the Sage level. Join

          sage_bank_transactions_v2.bank_account_id to get a practice_id.

          '
      entry_tracking:
        description: 'Tracking table: which GL journal entries have been picked up by

          downstream pipelines (reconciliation, reporting). Operational only.

          '
      sync_metadata:
        description: 'Operational bookkeeping for the Sage sync pipeline. Not for

          reporting.

          '
      sync_state:
        description: 'Operational sync cursor for bank-side rows. Not for reporting.

          '
      sync_state_gl:
        description: 'Operational sync cursor for GL rows. Not for reporting.

          '
      temp_gl_lines_1773341871:
        description: 'Temporary scratch table from a specific GL backfill run (suffix is

          the run id). Not authoritative; do not query for reporting.

          '
  dim_mappings:
    description: 'Shared dimension / lookup tables used across the other datasets

      (especially PMS_system''s reconciliation engine). Bank-description

      parsing rules, payment-category mappings, bank-vendor rules, and

      PMS provider / location mappings. Treat as slowly-changing reference

      data. Backup tables ("..._backup_YYYYMMDD") are point-in-time

      snapshots retained for audit; use the non-backup version for current

      lookups.

      '
    tables:
      bank_account_mapping:
        description: 'Canonical map from bank_account_id -> practice_name / location_id /

          updated_by / updated_at. Used to put a practice label on any bank

          row.

          '
      bank_description_mapping:
        description: 'Rules that parse a raw bank transaction description into vendor /

          category / is_carrier flag / approval status. Used by PMS_system

          fuzzy matching.

          '
      bank_description_mapping_backup_20260409:
        description: 'Point-in-time snapshot of bank_description_mapping taken 2026-04-09.

          Audit only.

          '
      bank_description_mapping_backup_20260410:
        description: 'Point-in-time snapshot of bank_description_mapping taken 2026-04-10.

          Audit only.

          '
      bank_description_staging:
        description: 'Staging area for proposed bank_description_mapping changes before

          they get promoted to the live table. Includes confidence,

          first_seen_at, processed_at.

          '
      bank_vendor_rules:
        description: 'Prefix / vendor rules table: maps raw description prefixes to

          canonical vendors. Paired with bank_description_mapping for

          bank-side normalisation.

          '
      payment_category_mapping:
        description: 'Maps normalised payment types to a GL category / ledger category,

          scoped by location and vendor. Drives auto-categorisation of

          incoming bank rows.

          '
      payment_category_mapping_backup_20260409:
        description: 'Point-in-time snapshot of payment_category_mapping taken

          2026-04-09. Audit only.

          '
      pms_location_mapping:
        description: 'Location dimension enriched from the PMS side: location_id,

          location_name, regional grouping, deal name, full name, PMS name,

          updated_by. Used to label PMS rows with the standard IDSO

          location hierarchy.

          '
      pms_provider_mapping:
        description: 'Provider (doctor / hygienist) dimension from the PMS side:

          location_id, location_name, provider_name, position, updated_by,

          additional_data. Use for provider-level reporting such as

          "production by doctor."

          '
